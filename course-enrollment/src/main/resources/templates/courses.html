<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Courses</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"/>
</head>
<body class="container mt-4">
<h2>Courses</h2>
<a th:href="@{/courses/new}" class="btn btn-primary mb-3">Add Course</a>

<table class="table table-bordered">
    <thead>
    <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Description</th>
        <th>Students Count</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="course : ${courses}">
        <td th:text="${course.id}"></td>
        <td th:text="${course.name}"></td>
        <td th:text="${course.description}"></td>
        <td th:text="${#lists.size(course.students)}"></td>
        <td>
            <a th:href="@{'/courses/edit/' + ${course.id}}" class="btn btn-sm btn-info">Edit</a>
            <a th:href="@{'/courses/delete/' + ${course.id}}" class="btn btn-sm btn-danger">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

<a th:href="@{/students}" class="btn btn-secondary">View Students</a>
</body>
</html>
