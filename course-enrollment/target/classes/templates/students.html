<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Students</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"/>
</head>
<body class="container mt-4">
<h2>Students</h2>
<a th:href="@{/students/new}" class="btn btn-primary mb-3">Add Student</a>

<table class="table table-bordered">
    <thead>
    <tr>
        <th>Id</th>
        <th>Name</th>
        <th>Email</th>
        <th>Course</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="student : ${students}">
        <td th:text="${student.id}"></td>
        <td th:text="${student.firstName + ' ' + student.lastName}"></td>
        <td th:text="${student.email}"></td>
        <td th:text="${student.course != null ? student.course.name : 'N/A'}"></td>
        <td>
            <a th:href="@{'/students/edit/' + ${student.id}}" class="btn btn-sm btn-info">Edit</a>
            <a th:href="@{'/students/delete/' + ${student.id}}" class="btn btn-sm btn-danger">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

<a th:href="@{/courses}" class="btn btn-secondary">View Courses</a>
</body>
</html>
