<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Form</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"/>
</head>
<body class="container mt-4">
<h2>Student Form</h2>

<form th:action="@{/students}" th:object="${student}" method="post">
    <input type="hidden" th:field="*{id}"/>

    <div class="form-group">
        <label for="firstName">First Name</label>
        <input id="firstName" type="text" class="form-control" th:field="*{firstName}"/>
        <div class="text-danger" th:if="${#fields.hasErrors('firstName')}"
             th:errors="*{firstName}"></div>
    </div>

    <div class="form-group">
        <label for="lastName">Last Name</label>
        <input id="lastName" type="text" class="form-control" th:field="*{lastName}"/>
        <div class="text-danger" th:if="${#fields.hasErrors('lastName')}"
             th:errors="*{lastName}"></div>
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" class="form-control" th:field="*{email}"/>
        <div class="text-danger" th:if="${#fields.hasErrors('email')}"
             th:errors="*{email}"></div>
    </div>

    <div class="form-group">
        <label for="course">Course</label>
        <select id="course" name="courseId" class="form-control">
            <option value="">-- Select --</option>
            <option th:each="c : ${courses}"
                    th:value="${c.id}"
                    th:text="${c.name}"
                    th:selected="${student.course != null and c.id == student.course.id}">
            </option>
        </select>
    </div>

    <button type="submit" class="btn btn-success">Save</button>
    <a th:href="@{/students}" class="btn btn-secondary">Cancel</a>
</form>
</body>
</html>
